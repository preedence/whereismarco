name: Keep Workflows Alive
on:
  schedule:
    - cron: '0 0 15 * *'  # Esegue il 15 di ogni mese
  workflow_dispatch:      # Permette l'attivazione manuale da GitHub UI

jobs:
  keepalive:
    runs-on: ubuntu-latest
    container:
      image: ubuntu:22.04  # Container con git preinstallato
    steps:
      - name: Install git (if needed) and configure
        run: |
          apt-get update
          apt-get install -y git
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
      - name: Create keepalive commit
        run: |
          git commit --allow-empty -m "Workflow keepalive: $(date +'%Y-%m-%d %H:%M:%S')"
          git push
