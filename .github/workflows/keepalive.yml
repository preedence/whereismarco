name: Keep Workflows Alive
on:
  schedule:
    - cron: '0 0 15 * *'  # Esegue il 15 di ogni mese
  workflow_dispatch:      # Permette l'attivazione manuale da GitHub UI

jobs:
  keepalive:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"  # Questa riga risolve l'avviso di deprecazione[web:57][web:60]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'  # Ulteriore garanzia che usiamo Node.js 24
      - name: Create keepalive commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit --allow-empty -m "Workflow keepalive: $(date +'%Y-%m-%d %H:%M:%S')"
          git push
