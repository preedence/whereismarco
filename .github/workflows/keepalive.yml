name: Keep Workflows Alive
on:
  schedule:
    - cron: '0 0 15 * *'  # Esegue il 15 di ogni mese
  workflow_dispatch:      # Permette l'attivazione manuale da GitHub UI

jobs:
  keepalive:
    runs-on: ubuntu-latest
    # Esplicitamente impostiamo Node.js 24 per evitare qualsiasi avviso di deprecazione
    steps:
      - uses: actions/checkout@v4.1.6  # Versione aggiornata che supporta Node.js 24[web:62][web:64]
      - uses: actions/setup-node@v4
        with:
          node-version: '24'  # Forziamo l'uso di Node.js 24[web:57][web:59]
      - name: Create keepalive commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit --allow-empty -m "Workflow keepalive: $(date +'%Y-%m-%d %H:%M:%S')"
          git push
