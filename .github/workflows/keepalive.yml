name: Keep Workflows Alive
on:
  schedule:
    - cron: '0 0 15 * *'  # Esegue il 15 di ogni mese (ben prima dei 60 giorni)
  workflow_dispatch:      # Permette test manuali immediati

jobs:
  keepalive:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # ESSENZIALE: permette di pushare
    steps:
      - name: Checkout repository with push permissions
        uses: actions/checkout@v4
        with:
          persist-credentials: true  # Mantiene il token per poter pushare dopo il checkout
      
      - name: Configure git user (necessario per il commit)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
      
      - name: Create and push keepalive commit
        run: |
          git commit --allow-empty -m "Workflow keepalive: $(date +'%Y-%m-%d %H:%M:%S')"
          git push
