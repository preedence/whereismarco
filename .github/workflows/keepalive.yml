name: Keep Workflows Alive
on:
  schedule:
    - cron: '0 0 15 * *'  # Esegue il 15 di ogni mese
  workflow_dispatch:      # Permette test manuali immediati

jobs:
  keepalive:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # ESSENZIALE per poter pushare
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true  # Mantiene il token per il push dopo checkout
      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit --allow-empty -m "keepalive: $(date -u +'%Y-%m-%d %H:%M:%S')"
          git push
